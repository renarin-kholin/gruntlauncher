name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install mold (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold clang pkg-config libfontconfig1-dev

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
